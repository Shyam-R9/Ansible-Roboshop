- name: Install and configure catalogue micro service
  hosts: catalogue
  become: yes
  vars:
    app_user: roboshop
    app_dir: /app
    mongo_host: 192.168.146.137
    zip_url: https://roboshop-artifacts.s3.amazonaws.com/catalogue-v3.zip

  tasks:
    - name: Disable default nodejs app stream
      ansible.builtin.dnf:
        name: nodejs
        state: absent
        disable_module: true
        
    - name: Enable nodejs 20 
      ansible.builtin.command: dnf module enable nodejs:20 -y
      changed_when: false

    - name: Install nodejs
      ansible.builtin.dnf:
        name: nodejs
        state: present
    
    - name: Create system user
      ansible.builtin.user:
        name: "{{ app_user }}"
        system: yes
        shell: /sbin/nologin
        home: "{{ app_dir }}"
        create_home: yes
        state: present

    - name: Create application directory
      ansible.builtin.file:
        name: "{{ app_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: '0755'

    - name: Download catalogue.zip file
      ansible.builtin.get_url:
        url: "{{ zzip_url }}" 
        dest: /tmp/catalogue.zip
        mode: '0644'

    - name: Extract catalogue.zip into /app
      ansible.builtin.unarchive:
        src: /tmp/catalogue.zip
        dest: "{{ app_dir }}"
        remote_src: yes
        creates: "{{ app_dir }}/package.json"

    - name: set permissions on the app directory
      ansible.builtin.file:
        path: "{{ app_dir }}"
        owner: "{{ app_user }}"
        group: " {{ aapp_user }}"
        recurse: yes

    - name: install npm dependencies
      community.general.npm:
        path: "{{ app_dir }}"
        production: true
        
    - name: copy systemd service file 
      ansible.builtin.copy:
        src: catalogue.service     
        dest: /etc/systemd/system/catalogue.service
        notify:
          - Reload systemd
          - Restart catalogue

    - name: copy mongodb repo file 
      ansible.builtin.copy:
        src: mongo.repo     
        dest: /etc/yum.repos.d/mongo.repo

    - name: Install mongo client
      ansible.builtin.dnf:
        name: mongodb-mongosh
        state: present

    - name: check if catalogue DB exists
      ansible.builtin.command: >
        mongosh --host {{ mongo_host }}
        --quiet
        --eval 'db.getSiblingDB("catalogue").getCollectionNames().length'
      register: catalogue_db_check
      changed_when: false

    - name: display DB Check output
      ansible.builtin.debug:
         msg: "{{ catalogue_db_check.stdout }}"
    
    - name: Load Master Data to Mongodb
      ansible.builtin.shell: >
        mongosh --host 192.168.146.137 </app/db/master-data.js
      when: catalogue_db_check.stdout | int == 0

  handlers:

    - name: Reload systemd
      ansible.builtin.systemd_service:
        daemon_reload: true

    - name: Restart catalogue
      ansible.builtin.service:
        name: catalogue
        state: restarted
        enabled: true