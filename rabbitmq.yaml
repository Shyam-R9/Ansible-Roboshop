- name: install and configure rabbitmq server
  hosts: rabbitmq
  become: yes

  tasks:
    - name: install dependencies
      ansible.builtin.dnf:
        name: erlang
        state: present

    - name: copy rabbitmq repo file
      ansible.builtin.copy:
        src: rabbitmq.repo
        dest: /etc/yum.repos.d/rabbitmq.repo

    - name: install rabbitmq
      ansible.builtin.dnf:
        name: rabbitmq-server
        state: present

    - name: enable and start the service
      ansible.builtin.service:
        name: rabbitmq-server
        enabled: true
        state: started

    - name: wait for Rabbitmq to be ready (port 5672 should be in listening state)
      ansible.builtin.wait_for:
        port: 5672
        delay: 5
        timeout: 60

    - name: Wait for Rabbitmqcli to respond
      ansible.builtin.command: rabbitmqctl status
      register: rabbitmq_status
      retries: 5
      delay: 5
      until: rabbitmq_status.rc == 0

    - name: create rabbitmq user
      community.rabbitmq.rabbitmq_user:
        user: roboshop
        password: roboshop123
        permissions:
          - vhost: /
            configure_priv: .*
            read_priv: .*
            write_priv: .*
        state: present

    - name: list RabbitMQ users
      ansible.builtin.command: rabbitmqctl list_users
      register: rabbit_users

    - name: list rabbitmq users
      ansible.builtin.debug:
        var: rabbit_users.stdout
