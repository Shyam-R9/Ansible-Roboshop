- name: install and configure redis
  hosts: redis

  tasks:
    - name: disable default redis app stream
      ansible.builtin.command: dnf module disable redis -y

    - name: enable redis 7
      ansible.builtin.command: dnf module enable redis:7 -y
 
    - name: install redis
      ansible.builtin.dnf:
        name: redis
        state: present

    - name: Allow Connections From All Hosts
      ansible.builtin.lineinfile:
        path: /etc/redis/redis.conf
        regexp: '^bind\s+127\.0\.0\.1'
        line: 'bind 0.0.0.0'
        
    - name: Disable Redis protected mode
      ansible.builtin.lineinfile:
        path: /etc/redis/redis.conf
        regexp: '^#?\s*protected-mode\s+.*'
        line: 'protected-mode no'
        state: present
        backup: yes
        
    - name: enable and start the redis service
      ansible.builtin.service:
        name: redis
        enabled: true
        state: started





  